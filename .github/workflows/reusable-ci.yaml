name: Production Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
      sonar_org:
        required: true
        type: string
        default: "organistation-org"
      skip_linting:
        required: false
        type: boolean
        default: false
      language:
        required: false
        type: string
        default: "node"

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  lint-and-review:
    name: Lint & Dependency Review
    if: ${{ !inputs.skip_linting }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dockerfile Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Dependency Review (PR Only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Notify Lint Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Linting Failed - ${{ inputs.image_name }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "Code linting or dependency review failed for ${{ inputs.image_name }}. Build halted."

  sast-sonar:
    name: SAST - SonarCloud
    needs: lint-and-review
    if: always() && (needs.lint-and-review.result == 'success' || inputs.skip_linting)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.organization=${{ inputs.sonar_org }}

      - name: Notify Sonar Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "SonarCloud Scan Failed - ${{ inputs.image_name }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "SonarCloud static analysis failed (or found vulnerabilities) for ${{ inputs.image_name }}. Build continuing as requested."

  snyk-scan:
    name: Snyk - Dependency Scan
    needs: sast-sonar
    if: always() && (needs.sast-sonar.result == 'success' || needs.sast-sonar.result == 'failure')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Node.js (if applicable)
      - name: Setup Node.js
        if: ${{ inputs.language == 'node' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Setup Python (if applicable)
      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Snyk Scan (Node)
      - name: Snyk Node Scan
        if: ${{ inputs.language == 'node' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # 4. Snyk Scan (Python)
      - name: Snyk Python Scan
        if: ${{ inputs.language == 'python' }}
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Notify Snyk Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Snyk Scan Failed - ${{ inputs.image_name }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "Snyk dependency vulnerability scan failed for ${{ inputs.image_name }}. Build continuing as requested."

  trivy-scan:
    name: Trivy - Secret & Config Scan
    needs: snyk-scan
    if: always() && (needs.snyk-scan.result == 'success' || needs.snyk-scan.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          hide-progress: false
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'secret,vuln'

      - name: Upload Trivy SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Notify Trivy Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Trivy Scan Failed - ${{ inputs.image_name }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "Trivy secret/config analysis failed for ${{ inputs.image_name }}. Build halted."

  build-and-push:
    name: Build & Push (Azure ACR)
    needs: trivy-scan
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build & Scan Container Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:$IMAGE_TAG
          docker build -t $IMAGE_NAME .

          # Run Trivy Container Scan before push
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --exit-code 0 --severity HIGH,CRITICAL $IMAGE_NAME

      - name: Push Branch-Specific Tags
        run: |
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g')
          IMAGE_PATH=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}

          docker push $IMAGE_PATH:${{ github.sha }}

          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:$BRANCH_NAME
          docker push $IMAGE_PATH:$BRANCH_NAME

      - name: Push Latest (Main Only)
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_PATH=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}
          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:latest
          docker push $IMAGE_PATH:latest

      - name: Notify Overall Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Success - ${{ inputs.image_name }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            CI Pipeline completed successfully for ${{ inputs.image_name }}!
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:${{ github.sha }}
