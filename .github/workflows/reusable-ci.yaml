name: Production Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
      sonar_org:
        required: true
        type: string
        default: "organistation-org"
      skip_linting:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  lint-and-review:
    name: Lint & Dependency Review
    if: ${{ !inputs.skip_linting }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dockerfile Lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Dependency Review (PR Only)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  sast:
    name: SAST - SonarCloud
    needs: lint-and-review
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.organization=${{ inputs.sonar_org }}

  snyk:
    name: Snyk - Dependency Scan
    needs: sast
    if: always()
    runs-on: ubuntu-latest
    outputs:
      failed: ${{ steps.snyk-scan.outcome == 'failure' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Snyk Security Scan
        id: snyk-scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      # Trivy Filesystem Scan (Secret Detection)
      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          hide-progress: false
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'secret,vuln'

      - name: Upload Trivy SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-push:
    name: Build & Push (Azure ACR)
    needs: [sast, snyk]
    if: success() || (needs.sast.result == 'success' && needs.snyk.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}

      - name: Build & Scan Container Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}:$IMAGE_TAG
          docker build -t $IMAGE_NAME .

          # Run Trivy Container Scan before push
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --exit-code 1 --severity HIGH,CRITICAL $IMAGE_NAME

      - name: Push Branch-Specific Tags
        run: |
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9]/-/g')
          IMAGE_PATH=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}

          docker push $IMAGE_PATH:${{ github.sha }}

          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:$BRANCH_NAME
          docker push $IMAGE_PATH:$BRANCH_NAME

      - name: Push Latest (Main Only)
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_PATH=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.image_name }}
          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:latest
          docker push $IMAGE_PATH:latest

      - name: Notify Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Success - ${{ inputs.image_name }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "Image ${{ inputs.image_name }} successfully pushed to ACR with tag ${{ github.sha }}."
