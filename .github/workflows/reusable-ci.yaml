name: Reusable Microservice CI

on:
  workflow_call:
    inputs:
      microservice:
        required: true
        type: string
      language:
        required: true
        type: string # 'node' or 'python'
      sonar_org:
        required: true
        type: string
      image_name:
        required: true
        type: string

jobs:
  lint:
    name: Lint & Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-node@v4
        if: ${{ inputs.language == 'node' }}
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v4
        if: ${{ inputs.language == 'python' }}
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: |
          if [ "${{ inputs.language }}" == "node" ]; then
            npm install -g eslint
          else
            pip install flake8
          fi

      - name: Run Lint
        run: |
          if [ "${{ inputs.language }}" == "node" ]; then
            # eslint . --fix || true
            echo "Skipping ESLint for now"
          else
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          fi

  sonarcloud:
    name: SonarCloud Scan
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar_org }}
            -Dsonar.projectKey=${{ inputs.sonar_org }}_${{ inputs.microservice }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Notify Sonar Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Security Gate Failed: SonarCloud - ${{ inputs.microservice }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "SonarCloud analysis for ${{ inputs.microservice }} found critical issues. Please review the dashboard."

  snyk-scan:
    name: Snyk Vulnerability Scan
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        if: ${{ inputs.language == 'node' }}
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        if: ${{ inputs.language == 'python' }}
        with:
          python-version: '3.10'

      - name: Snyk Scan
        uses: snyk/actions/python@master
        if: ${{ inputs.language == 'python' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: Snyk Node Scan
        uses: snyk/actions/node@master
        if: ${{ inputs.language == 'node' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: Notify Snyk Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Security Gate Failed: Snyk - ${{ inputs.microservice }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "Snyk vulnerability scan for ${{ inputs.microservice }} detected high/critical risks. Patching required."

  trivy-scan:
    name: Trivy - Secret & Config Scan
    needs: snyk-scan
    if: always() && (needs.snyk-scan.result == 'success' || needs.snyk-scan.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          hide-progress: false
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'secret,vuln'

      - name: Upload Trivy SARIF Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Notify Trivy Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Trivy Scan Failed - ${{ inputs.microservice }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: "Trivy secret/config analysis failed for ${{ inputs.microservice }}. Build halted."

  build-and-push:
    name: Build & Push (Azure ACR)
    needs: trivy-scan
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Login (ACR Admin)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Scan Container Image
        run: |
          IMAGE_TAG="v1.0.0"
          IMAGE_NAME=${{ secrets.ACR_LOGIN_SERVER }}/${{ inputs.microservice }}:$IMAGE_TAG
          docker build -t $IMAGE_NAME .

          # Run Trivy Container Scan before push
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --exit-code 0 --severity HIGH,CRITICAL $IMAGE_NAME
          
          docker push $IMAGE_NAME

      - name: Notify Overall Success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SOURCE_EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Success - ${{ inputs.microservice }}"
          to: ${{ secrets.TARGET_EMAIL }}
          from: ${{ secrets.SOURCE_EMAIL }}
          body: |
            CI Pipeline completed successfully for ${{ inputs.microservice }}!
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Image Tag: v1.0.0
